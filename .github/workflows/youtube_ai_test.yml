name: AI YouTube Manager

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 */6 * * *' 

jobs:
  test_connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run AI Monitor
        env:
          # यहाँ से मशीन को सारी चाबियां मिलेंगी 👇
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
          TOKEN_GBYOUTUBER: ${{ secrets.TOKEN_GBYOUTUBER }}
          TOKEN_HEALTH: ${{ secrets.TOKEN_HEALTH }}
          TOKEN_SUCCESS: ${{ secrets.TOKEN_SUCCESS }}
          TOKEN_SANATAN: ${{ secrets.TOKEN_SANATAN }}
          TOKEN_BOOK: ${{ secrets.TOKEN_BOOK }}
          TOKEN_MYSTERY: ${{ secrets.TOKEN_MYSTERY }}
          TOKEN_WEALTH: ${{ secrets.TOKEN_WEALTH }}
          TOKEN_GADGET: ${{ secrets.TOKEN_GADGET }}
          TOKEN_EMPIRE: ${{ secrets.TOKEN_EMPIRE }}
          TOKEN_ZEROTOUCH: ${{ secrets.TOKEN_ZEROTOUCH }}
        run: python ai_monitor.py
